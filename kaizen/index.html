  <script>
    (function () {
      function runTimer(id, startMinutes, startSeconds) {
        var el = document.getElementById(id);
        if (!el) return;
        var totalSeconds = startMinutes * 60 + (startSeconds || 0);
        function pad(n) { return (n < 10 ? '0' : '') + n; }
        function tick() {
          if (totalSeconds <= 0) {
            el.textContent = '00:00';
            return;
          }
          var m = Math.floor(totalSeconds / 60);
          var s = totalSeconds % 60;
          el.textContent = pad(m) + ':' + pad(s);
          totalSeconds -= 1;
        }
        tick();
        setInterval(tick, 1000);
      }
      runTimer('timer-match-1', 40, 33);
      runTimer('timer-match-2', 92, 0);
    })();
  </script>
